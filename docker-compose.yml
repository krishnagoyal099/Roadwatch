version: '3.8'

services:
  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      - CV_SERVICE_URL=http://ml:8001
      - CV_USE_MOCK=false
      - HOST=0.0.0.0
    depends_on:
      - ml
    restart: unless-stopped

  ml:
    build:
      context: ./apps/ml
    ports:
      - "8001:8001"
    restart: unless-stopped
