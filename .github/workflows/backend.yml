name: Backend Tests

on:
  push:
    paths:
      - "apps/backend/**"
  pull_request:
    paths:
      - "apps/backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env <<'EOF'
          APP_ENV=development
          DEBUG=true
          LOG_LEVEL=DEBUG
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          SUPABASE_STORAGE_BUCKET=complaint-images
          GROQ_API_KEY=
          CV_USE_MOCK=true
          FRONTEND_URL=http://localhost:5173
          HOST=0.0.0.0
          PORT=8000
          EOF

      - name: Run Backend Tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend/.coverage
